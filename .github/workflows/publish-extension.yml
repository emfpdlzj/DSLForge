name: Publish Extension

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-extension-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    env:
      DSLFORGE_TELEMETRY_PROXY_ENDPOINT: ${{ vars.DSLFORGE_TELEMETRY_PROXY_ENDPOINT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          package_version=$(node -p "require('./package.json').version")
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version $tag_version does not match package.json version $package_version."
            exit 1
          fi

      - name: Verify tag commit is on main
        run: |
          git fetch origin main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must point to a commit that is already on origin/main."
            exit 1
          fi

      - name: Run format check
        run: npm run format:check

      - name: Run typecheck
        run: npm run typecheck

      - name: Run test suite
        run: npm run test

      - name: Package extension
        run: npm exec --yes @vscode/vsce -- package

      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm exec --yes @vscode/vsce -- publish --packagePath "dslforge-${GITHUB_REF_NAME#v}.vsix" -p "$VSCE_PAT"
